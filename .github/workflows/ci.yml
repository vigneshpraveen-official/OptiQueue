name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: optiqueue-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      # Full suite incl. concurrency race on embedded Postgres
      - run: ./mvnw -B test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: optiqueue-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: optiqueue-frontend/package-lock.json
      - run: npm ci
      - run: npm run build
