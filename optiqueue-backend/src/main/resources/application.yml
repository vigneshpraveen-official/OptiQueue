spring:
  application:
    name: optiqueue-backend

  # JWT-only auth: no in-memory UserDetailsService, so silence its auto-config
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/optiqueue}
    username: ${DB_USERNAME:optiqueue}
    password: ${DB_PASSWORD:optiqueue}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}

  jpa:
    hibernate:
      ddl-auto: validate   # schema is owned by Flyway, never by Hibernate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: ${CACHE_TYPE:none}   # switched to 'redis' in Phase 5

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    redis:
      enabled: false   # enabled in Phase 5 once Upstash is wired in

optiqueue:
  bootstrap:
    admin-username: ${ADMIN_USERNAME:admin}
    admin-password: ${ADMIN_PASSWORD:admin12345}    # MUST override in production
    staff-username: ${STAFF_USERNAME:staff}
    staff-password: ${STAFF_PASSWORD:staff12345}    # MUST override in production
  seed:
    demo-products: ${SEED_DEMO_PRODUCTS:false}
  cache:
    ttl-seconds: ${CACHE_TTL_SECONDS:300}   # 5 min, per blueprint
  jwt:
    secret: ${JWT_SECRET:change-me-local-dev-secret-at-least-256-bits-long-0123456789}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24h

logging:
  level:
    org.hibernate.SQL: ${SQL_LOG_LEVEL:INFO}
